<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PG Driver Logistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: linear-gradient(135deg, #001a33 0%, #002366 100%); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        .gold-border { border: 2px solid #c5a059; }
        .gold-text { color: #c5a059; }
        .gold-bg { background-color: #c5a059; color: #002366; }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input, select {
            background: rgba(0, 0, 0, 0.2) !important;
            color: white !important;
        }
    </style>
</head>
<body class="p-4">
    <header class="text-center mb-8 pt-4">
        <h1 class="text-3xl font-bold gold-text tracking-widest uppercase">PG Driver Logistics</h1>
        <p class="text-xs uppercase tracking-widest opacity-70">Playa Grande Golf & Ocean Club</p>
    </header>

    <div class="max-w-md mx-auto">
        <div id="startPanel" class="glass p-6 rounded-2xl shadow-2xl">
            <h2 class="text-xl font-semibold mb-6 text-center border-b border-[#c5a059] pb-2 text-white">REGISTRO DE SALIDA</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs uppercase mb-1 opacity-70">Nombre del Driver</label>
                    <input type="text" id="driver" class="w-full p-3 rounded gold-border outline-none">
                </div>

                <div>
                    <label class="block text-xs uppercase mb-1 opacity-70">Vehículo</label>
                    <select id="vehicle" class="w-full p-3 rounded gold-border outline-none">
                        <option value="Tahoe 2026 #1">Chevrolet Tahoe 2026 #1</option>
                        <option value="Tahoe 2026 #2">Chevrolet Tahoe 2026 #2</option>
                        <option value="Suburban 2026 #1">Chevrolet Suburban 2026 #1</option>
                        <option value="Mercedes Sprinter">Mercedes-Benz Sprinter</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs uppercase mb-1 opacity-70">Villa</label>
                        <input type="text" id="villa" class="w-full p-3 rounded gold-border outline-none">
                    </div>
                    <div>
                        <label class="block text-xs uppercase mb-1 opacity-70">Pasajeros</label>
                        <input type="number" id="pax" class="w-full p-3 rounded gold-border outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-xs uppercase mb-1 opacity-70">Destino</label>
                    <input type="text" id="destino" class="w-full p-3 rounded gold-border outline-none">
                </div>

                <div>
                    <label class="block text-xs uppercase mb-1 opacity-70 font-bold gold-text">Kilometraje Inicial</label>
                    <input type="number" id="km_inicio" class="w-full p-3 rounded gold-border outline-none text-xl font-bold">
                </div>

                <button type="button" onclick="enviar()" id="btnStart" class="w-full p-4 gold-bg font-bold rounded-xl mt-4">
                    REGISTRAR SALIDA
                </button>
            </div>
        </div>

        <div id="successPanel" class="hidden glass p-8 rounded-2xl shadow-2xl text-center border-2 border-green-500">
            <div class="text-6xl mb-4">✅</div>
            <h2 class="text-2xl font-bold mb-2">¡REGISTRO ENVIADO!</h2>
            <p class="opacity-80 mb-8">La información se ha procesado correctamente.</p>
            <button onclick="location.reload()" class="w-full p-4 gold-bg font-bold rounded-xl">NUEVO REGISTRO</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxTkCNw0TPoCAdnCNaFMnMUjCAtAMC30sZUrjpS50O90yqBFEqEYMrzGZJoCQ3kPQgr/exec";

        function enviar() {
            const btn = document.getElementById('btnStart');
            const data = {
                conductor: document.getElementById('driver').value,
                unidad: document.getElementById('vehicle').value,
                villa: document.getElementById('villa').value,
                pasajeros: document.getElementById('pax').value,
                destino: document.getElementById('destino').value,
                km_actual: document.getElementById('km_inicio').value
            };

            if (!data.conductor || !data.km_actual) {
                alert("Complete nombre y kilometraje");
                return;
            }

            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            // MÉTODO ROBUSTO: Enviamos y saltamos de inmediato
            fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            });

            // No esperamos respuesta, cambiamos de pantalla en 500ms
            setTimeout(() => {
                document.getElementById('startPanel').style.display = 'none';
                document.getElementById('successPanel').classList.remove('hidden');
            }, 500);
        }
    </script>
</body>
</html>
