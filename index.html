<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PG Driver Logistics v2.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #001a33 0%, #002366 100%); color: white; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        .gold-border { border: 2px solid #c5a059; }
        .gold-text { color: #c5a059; }
        .gold-bg { background-color: #c5a059; color: #002366; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-active { border-bottom: 4px solid #c5a059; color: #c5a059; font-weight: bold; }
        input, select { background: rgba(0, 0, 0, 0.3) !important; color: white !important; }
        optgroup { background: #001a33; color: #c5a059; font-weight: bold; }
        option { background: #001a33; color: white; }
    </style>
</head>
<body class="p-4">
    <header class="text-center mb-6 pt-4">
        <h1 class="text-3xl font-bold gold-text tracking-widest uppercase">PG Logistics</h1>
        <p class="text-xs uppercase tracking-widest opacity-70">Control de Flota - Playa Grande</p>
    </header>

    <div class="max-w-md mx-auto">
        <div class="flex mb-6 text-center border-b border-white/10">
            <div id="tab1" onclick="switchTab('salida')" class="flex-1 p-3 cursor-pointer tab-active">SALIDA</div>
            <div id="tab2" onclick="switchTab('entrada')" class="flex-1 p-3 cursor-pointer opacity-50">ENTRADA</div>
        </div>

        <div id="formPanel" class="glass p-6 rounded-2xl shadow-2xl">
            <form id="logisticsForm" class="space-y-4">
                <input type="hidden" name="action" id="formAction" value="salida">
                
                <div id="sectionConductor">
                    <label class="block text-xs uppercase mb-1 opacity-70">Nombre del Driver</label>
                    <input type="text" name="conductor" id="driver" placeholder="Ingrese nombre" class="w-full p-3 rounded gold-border outline-none">
                </div>

                <div>
                    <label class="block text-xs uppercase mb-1 opacity-70">Vehículo (Por Placa)</label>
                    <select name="unidad" id="vehicle" class="w-full p-3 rounded gold-border outline-none text-lg">
                        <option value="" disabled selected>Seleccione la unidad...</option>
                        
                        <optgroup label="CHEVROLET TAHOE">
                            <option value="Tahoe - 6785">Tahoe - 6785</option>
                            <option value="Tahoe - 0255">Tahoe - 0255</option>
                            <option value="Tahoe - 1702">Tahoe - 1702</option>
                            <option value="Tahoe - 4504">Tahoe - 4504</option>
                            <option value="Tahoe - 0846">Tahoe - 0846</option>
                        </optgroup>

                        <optgroup label="CHEVROLET SUBURBAN">
                            <option value="Suburban - 0663">Suburban - 0663</option>
                            <option value="Suburban - 0666">Suburban - 0666</option>
                            <option value="Suburban - 3354">Suburban - 3354</option>
                            <option value="Suburban - 7149">Suburban - 7149</option>
                            <option value="Suburban - 7938">Suburban - 7938</option>
                        </optgroup>

                        <optgroup label="MERCEDES-BENZ">
                            <option value="Sprinter - 6689">Sprinter - 6689</option>
                        </optgroup>
                    </select>
                </div>

                <div id="extraFields" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs uppercase mb-1 opacity-70">Villa / Miembro</label>
                            <input type="text" name="villa" class="w-full p-3 rounded gold-border outline-none">
                        </div>
                        <div>
                            <label class="block text-xs uppercase mb-1 opacity-70">Pax</label>
                            <input type="number" name="pasajeros" class="w-full p-3 rounded gold-border outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs uppercase mb-1 opacity-70">Destino</label>
                        <input type="text" name="destino" class="w-full p-3 rounded gold-border outline-none">
                    </div>
                </div>

                <div>
                    <label id="kmLabel" class="block text-xs uppercase mb-1 opacity-70 font-bold gold-text">Kilometraje Inicial</label>
                    <input type="number" name="km_actual" id="km" required class="w-full p-3 rounded gold-border outline-none text-xl font-bold" placeholder="0">
                </div>

                <button type="button" onclick="enviar()" id="btnSubmit" class="w-full p-4 gold-bg font-bold rounded-xl mt-4 uppercase tracking-widest">
                    Registrar Salida
                </button>
            </form>
        </div>

        <div id="successPanel" class="hidden glass p-8 rounded-2xl shadow-2xl text-center border-2 border-green-500">
            <div class="text-6xl mb-4">✅</div>
            <h2 class="text-2xl font-bold mb-2">SINCRO EXITOSA</h2>
            <p id="successMsg" class="opacity-80 mb-8">El registro se envió a la nube.</p>
            <button onclick="location.reload()" class="w-full p-4 gold-bg font-bold rounded-xl">NUEVO REGISTRO</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx8lo5fm3IF22zu6on_Q9o3-JDtw-iM4Uyd9cSz0_VhCJskIum3oBxRHMKLewz1T7fGLQ/exec";

        function switchTab(type) {
            const isSalida = type === 'salida';
            document.getElementById('formAction').value = type;
            document.getElementById('tab1').className = isSalida ? 'flex-1 p-3 cursor-pointer tab-active' : 'flex-1 p-3 cursor-pointer opacity-50';
            document.getElementById('tab2').className = !isSalida ? 'flex-1 p-3 cursor-pointer tab-active' : 'flex-1 p-3 cursor-pointer opacity-50';
            document.getElementById('extraFields').style.display = isSalida ? 'block' : 'none';
            document.getElementById('sectionConductor').style.display = isSalida ? 'block' : 'none';
            document.getElementById('kmLabel').innerText = isSalida ? 'Kilometraje Inicial' : 'Kilometraje Final';
            document.getElementById('btnSubmit').innerText = isSalida ? 'Registrar Salida' : 'Registrar Entrada';
        }

        function enviar() {
            const btn = document.getElementById('btnSubmit');
            const vehicle = document.getElementById('vehicle').value;
            const km = document.getElementById('km').value;
            
            if (!vehicle || !km) {
                alert("Por favor, Sr. Solana, seleccione la unidad e ingrese el kilometraje.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            const formData = new URLSearchParams(new FormData(document.getElementById('logisticsForm')));

            fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            }).then(() => {
                document.getElementById('formPanel').classList.add('hidden');
                document.getElementById('successPanel').classList.remove('hidden');
            });
        }
    </script>
</body>
</html>
