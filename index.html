<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PG Logistics Corporate | Asset Tracking</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000d1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/7544/7544957.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000d1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(197, 160, 89, 0.15); }
        .gold-border { border: 1px solid #c5a059; }
        .gold-text { color: #c5a059; }
        .gold-bg { background: linear-gradient(135deg, #c5a059 0%, #947a41 100%); color: #000d1a; }
        .tab-active { border-bottom: 3px solid #c5a059; color: #c5a059; font-weight: 800; opacity: 1 !important; }
        input, select { background: rgba(0, 0, 0, 0.5) !important; color: white !important; border: 1px solid rgba(255,255,255,0.1) !important; transition: all 0.3s ease; }
        input:focus { border-color: #c5a059 !important; outline: none; box-shadow: 0 0 10px rgba(197, 160, 89, 0.2); }
        .status-dot { width: 8px; height: 8px; background: #c5a059; border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <div id="loginSection" class="w-full max-w-md mt-16 p-8 glass rounded-[2rem] text-center shadow-2xl">
        <div class="flex justify-center mb-6">
            <div class="p-4 bg-white/5 rounded-full gold-border">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 gold-text" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
        </div>
        <h2 class="text-2xl font-black gold-text tracking-widest uppercase mb-2">Security Access</h2>
        <p class="text-[10px] uppercase tracking-[0.3em] mb-8 opacity-40 text-white">Authorized Personnel Only</p>
        
        <input type="password" id="accessPin" placeholder="DRIVER PIN" class="w-full p-5 rounded-2xl text-center text-3xl tracking-[0.5em] mb-4">
        <button onclick="checkAccess()" class="w-full p-5 gold-bg font-black rounded-2xl uppercase tracking-widest shadow-xl active:scale-95 transition-transform">
            Authenticate
        </button>
    </div>

    <div id="mainApp" class="hidden w-full max-w-md">
        <header class="text-center mb-8 pt-4">
            <div class="flex items-center justify-center gap-2 mb-1">
                <div class="status-dot"></div>
                <h1 class="text-2xl font-black gold-text tracking-[0.3em] uppercase italic">PG Logistics</h1>
            </div>
            <p id="driverNameDisplay" class="text-[9px] uppercase tracking-[0.5em] opacity-40">Discovery Land Co. Audit System</p>
        </header>

        <div class="flex mb-8 text-center border-b border-white/5">
            <div id="tab1" onclick="switchTab('salida')" class="flex-1 p-4 cursor-pointer tab-active opacity-40 transition-all text-xs tracking-widest">CHECK-OUT</div>
            <div id="tab2" onclick="switchTab('entrada')" class="flex-1 p-4 cursor-pointer opacity-40 transition-all text-xs tracking-widest">CHECK-IN</div>
        </div>

        <div id="formPanel" class="glass p-8 rounded-[2rem] shadow-2xl relative overflow-hidden">
            <form id="logisticsForm" class="space-y-5">
                
                <input type="hidden" name="auth_token" value="REPLACE_WITH_CORPORATE_SECURE_TOKEN">
                <input type="hidden" name="action" id="formAction" value="salida">
                <input type="hidden" name="conductor" id="driverHidden">
                <input type="hidden" name="latitud" id="lat">
                <input type="hidden" name="longitud" id="lng">

                <div>
                    <label class="block text-[10px] uppercase mb-2 opacity-50 font-black tracking-widest gold-text">Fleet Asset (Unit)</label>
                    <select name="unidad" id="vehicle" required class="w-full p-5 rounded-2xl gold-border appearance-none cursor-pointer">
                        <option value="" disabled selected>Select Unit...</option>
                        
                        <optgroup label="PREMIUM SUVS (TAHOE)">
                            <option value="Tahoe-1030">Tahoe - 1030</option>
                            <option value="Tahoe-1031">Tahoe - 1031</option>
                            <option value="Tahoe-1032">Tahoe - 1032</option>
                            <option value="Tahoe-1033">Tahoe - 1033</option>
                            <option value="Tahoe-1034">Tahoe - 1034</option>
                            <option value="Tahoe-1035">Tahoe - 1035</option>
                        </optgroup>

                        <optgroup label="EXECUTIVE SUVS (SUBURBAN)">
                            <option value="Suburban-1130">Suburban - 1130</option>
                            <option value="Suburban-1131">Suburban - 1131</option>
                            <option value="Suburban-1132">Suburban - 1132</option>
                            <option value="Suburban-1133">Suburban - 1133</option>
                            <option value="Suburban-1134">Suburban - 1134</option>
                            <option value="Suburban-1135">Suburban - 1135</option>
                        </optgroup>

                        <optgroup label="SPECIALIZED TRANSPORT">
                            <option value="Sprinter-6987">Mercedes-Benz Sprinter - 6987</option>
                        </optgroup>
                    </select>
                </div>

                <div id="extraFields" class="space-y-5 animate-in fade-in duration-500">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] uppercase mb-2 opacity-50 font-bold">Villa / Member</label>
                            <input type="text" name="villa" class="w-full p-4 rounded-xl" placeholder="Ex: V-04">
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase mb-2 opacity-50 font-bold">Pax Count</label>
                            <input type="number" name="pasajeros" class="w-full p-4 rounded-xl" placeholder="0">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase mb-2 opacity-50 font-bold">Destination Details</label>
                        <input type="text" name="destino" class="w-full p-4 rounded-xl" placeholder="Entry Point / Beach Club">
                    </div>
                </div>

                <div>
                    <label id="kmLabel" class="block text-[10px] uppercase mb-2 gold-text font-black tracking-widest">Initial Odometer</label>
                    <input type="number" name="km_actual" id="km" required class="w-full p-5 rounded-2xl text-3xl font-black text-center gold-text bg-black/40" placeholder="00000">
                </div>

                <button type="button" onclick="validarYEnviar()" id="btnSubmit" class="w-full p-6 gold-bg font-black rounded-2xl mt-6 uppercase tracking-[0.3em] shadow-2xl active:scale-95 transition-all">
                    Register Action
                </button>
            </form>
        </div>

        <div id="successPanel" class="hidden glass p-12 rounded-[2.5rem] text-center border-2 border-green-500/30">
            <div class="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <span class="text-4xl">✓</span>
            </div>
            <h2 class="text-2xl font-black mb-3 gold-text">AUDIT LOG SYNCED</h2>
            <p class="opacity-40 mb-10 text-[11px] uppercase tracking-widest leading-relaxed">The transaction has been encrypted and sent to Corporate Security Headquarters.</p>
            <button onclick="location.reload()" class="w-full p-5 bg-white/5 border border-white/10 font-bold rounded-2xl hover:bg-white/10 transition-all uppercase tracking-widest text-xs">New Log Entry</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzKKT9mMploGu-PzDGgJu2W4qqkBhnT1CXZ0z6CcFLOob2vPbof-ppgKCKqu7rTQ9ON/exec";

        function checkAccess() {
            const pin = document.getElementById('accessPin').value;
            if(pin === "1234") { 
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('driverHidden').value = "Driver Auth: ID-" + pin;
            } else {
                alert("ACCESS DENIED: Invalid Security PIN.");
            }
        }

        function switchTab(type) {
            const isSalida = type === 'salida';
            document.getElementById('formAction').value = type;
            document.getElementById('tab1').className = isSalida ? 'flex-1 p-4 cursor-pointer tab-active' : 'flex-1 p-4 cursor-pointer opacity-40';
            document.getElementById('tab2').className = !isSalida ? 'flex-1 p-4 cursor-pointer tab-active' : 'flex-1 p-4 cursor-pointer opacity-40';
            document.getElementById('extraFields').style.display = isSalida ? 'block' : 'none';
            document.getElementById('kmLabel').innerText = isSalida ? 'Initial Odometer' : 'Final Odometer';
            document.getElementById('btnSubmit').innerText = isSalida ? 'Register Check-Out' : 'Register Check-In';
        }

        function validarYEnviar() {
            const btn = document.getElementById('btnSubmit');
            const vehicle = document.getElementById('vehicle').value;
            const km = document.getElementById('km').value;

            if(!vehicle || !km) {
                alert("Missing Critical Data: Unit and Odometer are mandatory.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "CAPTURING GPS AUDIT...";

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    document.getElementById('lat').value = pos.coords.latitude;
                    document.getElementById('lng').value = pos.coords.longitude;
                    enviarDatos();
                },
                (err) => {
                    alert("SECURITY ERROR: GPS must be enabled for Audit compliance.");
                    btn.disabled = false;
                    btn.innerText = "RETRY AUDIT";
                },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        }

        async function enviarDatos() {
            const btn = document.getElementById('btnSubmit');
            btn.innerText = "ENCRYPTING & SENDING...";

            const form = document.getElementById('logisticsForm');
            const formData = new URLSearchParams(new FormData(form));

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData
                });
                
                document.getElementById('formPanel').classList.add('hidden');
                document.getElementById('successPanel').classList.remove('hidden');
            } catch (error) {
                alert("NETWORK ERROR: Data could not reach Corporate Server.");
                btn.disabled = false;
                btn.innerText = "RETRY SYNC";
            }
        }
    </script>
</body>
</html>
